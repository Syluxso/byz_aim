spring:
  application:
    name: byz-iam
  datasource:
    url: ${DB_URL:jdbc:postgresql://127.0.0.1:5432/iam}
    username: ${DB_USER:iam}
    password: ${DB_PASS:iam}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        default_schema: iam
  flyway:
    schemas: iam
    default-schema: iam
    create-schemas: true
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
    admin:
      fail-fast: false

server:
  port: ${PORT:8082}

byz:
  kafka:
    enabled: ${BYZ_KAFKA_ENABLED:true}
    topics:
      iam-user: byz.iam.user

iam:
  issuer: ${IAM_ISSUER:https://iam.byzantineapp.dev}
  access-token-ttl-seconds: ${ACCESS_TOKEN_TTL:3600}
  subject-token-ttl-seconds: ${SUBJECT_TOKEN_TTL:900}
  refresh-token-ttl-seconds: ${REFRESH_TOKEN_TTL:2592000}
  key-dir: ${IAM_KEY_DIR:./keys}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.nyberg.iam.config.JwtAuthenticationFilter: WARN
  pattern:
    console: '{"time":"%d{yyyy-MM-dd HH:mm:ss.SSS}","level":"%level","service":"byz-iam","logger":"%logger{36}","msg":"%msg"}%n'